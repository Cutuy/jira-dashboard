<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#71717a"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="40" y="40" font-size="18" font-weight="600" fill="#18181b">Architecture</text>
  <text x="40" y="60" font-size="11" fill="#71717a">One dashboard per host. Each project gets its own cwd, env, and store. Each ticket gets its own worktree and coder session.</text>

  <!-- ============ SECTION 1: ISOLATION ============ -->
  <text x="40" y="100" font-size="12" font-weight="600" fill="#18181b">1. Process & filesystem isolation</text>

  <!-- Dashboard (single source, fan-out below) -->
  <rect x="40" y="120" width="1020" height="64" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="60" y="146" font-size="13" font-weight="600" fill="#3730a3">Dashboard</text>
  <text x="60" y="166" font-size="10" fill="#52525b">Express  ·  SQLite store  ·  SSE streaming  ·  reads &lt;project&gt;/.jira-dashboard/.env and &lt;project&gt;/.env</text>
  <text x="60" y="180" font-size="10" fill="#52525b">spawns one coder subprocess per ticket (opencode / claude / custom)</text>

  <!-- Connectors dashboard -> projects -->
  <line x1="290" y1="184" x2="290" y2="208" stroke="#a1a1aa" stroke-width="1.2" marker-end="url(#arrow-light)"/>
  <line x1="810" y1="184" x2="810" y2="208" stroke="#a1a1aa" stroke-width="1.2" marker-end="url(#arrow-light)"/>

  <!-- ============ Project A ============ -->
  <rect x="40" y="216" width="500" height="200" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <rect x="40" y="216" width="500" height="32" rx="8" fill="#ede9fe"/>
  <rect x="40" y="240" width="500" height="8" fill="#ede9fe"/>
  <text x="60" y="237" font-size="12" font-weight="600" fill="#5b21b6">Project A</text>
  <text x="125" y="237" font-size="10" fill="#7c3aed" font-family="ui-monospace, SFMono-Regular, monospace">/home/user/project-a</text>

  <!-- Project A: env + store -->
  <rect x="60" y="258" width="220" height="22" rx="4" fill="#fff" stroke="#ddd6fe"/>
  <text x="72" y="273" font-size="9" fill="#52525b">.env  ·  .venv  ·  python + pytest</text>

  <rect x="290" y="258" width="230" height="22" rx="4" fill="#fff" stroke="#ddd6fe"/>
  <text x="302" y="273" font-size="9" fill="#52525b">store.db (per-project)</text>

  <text x="60" y="300" font-size="9" font-weight="600" fill="#5b21b6" letter-spacing="0.5">WORKTREES</text>

  <!-- Project A: 3 worktree rows -->
  <rect x="60" y="308" width="460" height="28" rx="4" fill="#fff" stroke="#ddd6fe"/>
  <text x="72" y="326" font-size="10" fill="#18181b" font-family="ui-monospace, SFMono-Regular, monospace">ticket-a1b2c3</text>
  <text x="220" y="326" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace">.worktrees/a1b2c3</text>
  <text x="500" y="326" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace" text-anchor="end">ses_a1b2c3</text>

  <rect x="60" y="340" width="460" height="28" rx="4" fill="#fff" stroke="#ddd6fe"/>
  <text x="72" y="358" font-size="10" fill="#18181b" font-family="ui-monospace, SFMono-Regular, monospace">ticket-d4e5f6</text>
  <text x="220" y="358" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace">.worktrees/d4e5f6</text>
  <text x="500" y="358" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace" text-anchor="end">ses_d4e5f6</text>

  <rect x="60" y="372" width="460" height="28" rx="4" fill="#fff" stroke="#ddd6fe"/>
  <text x="72" y="390" font-size="10" fill="#18181b" font-family="ui-monospace, SFMono-Regular, monospace">ticket-g7h8i9</text>
  <text x="220" y="390" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace">.worktrees/g7h8i9</text>
  <text x="500" y="390" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace" text-anchor="end">ses_g7h8i9</text>

  <!-- ============ Project B ============ -->
  <rect x="560" y="216" width="500" height="200" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <rect x="560" y="216" width="500" height="32" rx="8" fill="#d1fae5"/>
  <rect x="560" y="240" width="500" height="8" fill="#d1fae5"/>
  <text x="580" y="237" font-size="12" font-weight="600" fill="#065f46">Project B</text>
  <text x="645" y="237" font-size="10" fill="#047857" font-family="ui-monospace, SFMono-Regular, monospace">/home/user/project-b</text>

  <rect x="580" y="258" width="220" height="22" rx="4" fill="#fff" stroke="#a7f3d0"/>
  <text x="592" y="273" font-size="9" fill="#52525b">.env  ·  node_modules  ·  TS + vite</text>

  <rect x="810" y="258" width="230" height="22" rx="4" fill="#fff" stroke="#a7f3d0"/>
  <text x="822" y="273" font-size="9" fill="#52525b">store.db (per-project)</text>

  <text x="580" y="300" font-size="9" font-weight="600" fill="#065f46" letter-spacing="0.5">WORKTREES</text>

  <rect x="580" y="308" width="460" height="28" rx="4" fill="#fff" stroke="#a7f3d0"/>
  <text x="592" y="326" font-size="10" fill="#18181b" font-family="ui-monospace, SFMono-Regular, monospace">ticket-j1k2l3</text>
  <text x="740" y="326" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace">.worktrees/j1k2l3</text>
  <text x="1020" y="326" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace" text-anchor="end">ses_j1k2l3</text>

  <rect x="580" y="340" width="460" height="28" rx="4" fill="#fff" stroke="#a7f3d0"/>
  <text x="592" y="358" font-size="10" fill="#18181b" font-family="ui-monospace, SFMono-Regular, monospace">ticket-m4n5o6</text>
  <text x="740" y="358" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace">.worktrees/m4n5o6</text>
  <text x="1020" y="358" font-size="9" fill="#71717a" font-family="ui-monospace, SFMono-Regular, monospace" text-anchor="end">ses_m4n5o6</text>

  <!-- ============ SECTION 2: LIFECYCLE ============ -->
  <text x="40" y="455" font-size="12" font-weight="600" fill="#18181b">2. Ticket lifecycle</text>

  <!-- Stage 1: Clarification (blue) -->
  <rect x="40" y="490" width="240" height="120" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <circle cx="62" cy="512" r="4" fill="#3b82f6"/>
  <text x="74" y="516" font-size="12" font-weight="600" fill="#1d4ed8">Clarification</text>
  <line x1="60" y1="526" x2="260" y2="526" stroke="#bfdbfe" stroke-width="1"/>
  <text x="60" y="548" font-size="10" fill="#52525b">AI asks focused questions;</text>
  <text x="60" y="564" font-size="10" fill="#52525b">you answer, multi-round.</text>
  <text x="60" y="592" font-size="9" fill="#1d4ed8" font-style="italic">no worktree yet</text>

  <!-- Stage 2: Implementation (amber) -->
  <rect x="300" y="490" width="240" height="120" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <circle cx="322" cy="512" r="4" fill="#f59e0b"/>
  <text x="334" y="516" font-size="12" font-weight="600" fill="#b45309">Implementation</text>
  <line x1="320" y1="526" x2="520" y2="526" stroke="#fde68a" stroke-width="1"/>
  <text x="320" y="548" font-size="10" fill="#52525b">Plan committed, worktree</text>
  <text x="320" y="564" font-size="10" fill="#52525b">created, coder writes code.</text>
  <text x="320" y="592" font-size="9" fill="#b45309" font-style="italic">live resource metrics via SSE</text>

  <!-- Stage 3: Review (violet) -->
  <rect x="560" y="490" width="240" height="120" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <circle cx="582" cy="512" r="4" fill="#7c3aed"/>
  <text x="594" y="516" font-size="12" font-weight="600" fill="#6d28d9">Review</text>
  <line x1="580" y1="526" x2="780" y2="526" stroke="#ddd6fe" stroke-width="1"/>
  <text x="580" y="548" font-size="10" fill="#52525b">Diff + tests + per-stage</text>
  <text x="580" y="564" font-size="10" fill="#52525b">resource usage shown.</text>
  <text x="580" y="592" font-size="9" fill="#6d28d9" font-style="italic">feedback loops back</text>

  <!-- Stage 4: Done (zinc) -->
  <rect x="820" y="490" width="240" height="120" rx="8" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="1.5"/>
  <circle cx="842" cy="512" r="4" fill="#52525b"/>
  <text x="854" y="516" font-size="12" font-weight="600" fill="#3f3f46">Done</text>
  <line x1="840" y1="526" x2="1040" y2="526" stroke="#d4d4d8" stroke-width="1"/>
  <text x="840" y="548" font-size="10" fill="#52525b">Cherry-pick into main,</text>
  <text x="840" y="564" font-size="10" fill="#52525b">worktree &amp; branch cleaned.</text>
  <text x="840" y="592" font-size="9" fill="#3f3f46" font-style="italic">commit visible in log</text>

  <!-- Arrows between stages (forward) -->
  <line x1="280" y1="550" x2="300" y2="550" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="550" x2="560" y2="550" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="550" x2="820" y2="550" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Feedback loop: Review -> Clarification (curved above) -->
  <path d="M 680 490 C 680 420, 540 420, 420 420 C 280 420, 160 420, 160 490"
        fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arrow-violet)"/>
  <rect x="378" y="412" width="84" height="16" rx="8" fill="#ffffff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="420" y="424" font-size="10" fill="#7c3aed" text-anchor="middle" font-style="italic">feedback</text>

  <!-- Footer / invariant -->
  <rect x="40" y="640" width="1020" height="48" rx="8" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/>
  <text x="60" y="660" font-size="10" font-weight="600" fill="#18181b">Invariants</text>
  <text x="60" y="678" font-size="10" fill="#52525b">worktrees are git-isolated  ·  coder sessions are LLM-isolated (no cross-ticket context leak)  ·  one store.db per project  ·  env files are project-local</text>
</svg>
