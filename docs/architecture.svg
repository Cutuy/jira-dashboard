<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="900" height="680" fill="#fafafa" rx="8"/>

  <text x="450" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#18181b">Isolation Architecture</text>
  <text x="450" y="48" text-anchor="middle" font-size="10" fill="#71717a">Every process runs with the repo as cwd, inheriting that repo's dependencies and env</text>

  <!-- Dashboard -->
  <rect x="30" y="70" width="840" height="44" rx="6" fill="#f0f0f0" stroke="#d4d4d8" stroke-width="1" filter="url(#s)"/>
  <text x="44" y="90" font-size="11" font-weight="600" fill="#18181b">Dashboard</text>
  <text x="44" y="104" font-size="9" fill="#52525b">SQLite store · SSE streaming · config from &lt;project&gt;/.jira-dashboard/.env + &lt;project&gt;/.env</text>

  <!-- Repo A -->
  <rect x="30" y="136" width="410" height="530" rx="8" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1" filter="url(#s)"/>
  <rect x="30" y="136" width="410" height="30" rx="8" fill="#e5e5e5"/>
  <rect x="30" y="158" width="410" height="8" fill="#e5e5e5"/>
  <text x="235" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#27272a">Git Repo A  —  /home/user/project-a</text>

  <rect x="44" y="178" width="382" height="26" rx="4" fill="#fff" stroke="#d4d4d8" stroke-width="1"/>
  <text x="54" y="192" font-size="9" font-weight="500" fill="#52525b">.env</text>
  <text x="80" y="192" font-size="8" fill="#71717a">DEEPSEEK_API_KEY=sk-...  VIRTUAL_ENV=project-a/.venv</text>

  <rect x="44" y="210" width="382" height="26" rx="4" fill="#fff" stroke="#d4d4d8" stroke-width="1"/>
  <text x="54" y="224" font-size="9" font-weight="500" fill="#52525b">.venv</text>
  <text x="80" y="224" font-size="8" fill="#71717a">python3, pip, pytest, mypy</text>

  <!-- Ticket 1 -->
  <rect x="44" y="250" width="382" height="104" rx="6" fill="#fff" stroke="#d4d4d8" stroke-width="1" filter="url(#s)"/>
  <rect x="44" y="250" width="382" height="24" rx="6" fill="#fafafa"/>
  <rect x="44" y="268" width="382" height="6" fill="#fafafa"/>
  <text x="235" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#27272a">Ticket: add-s3-storage-a1b2c3</text>

  <rect x="54" y="284" width="170" height="34" rx="4" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>
  <text x="139" y="298" text-anchor="middle" font-size="9" font-weight="500" fill="#27272a">Worktree</text>
  <text x="139" y="310" text-anchor="middle" font-size="8" fill="#71717a">.worktrees/a1b2c3</text>

  <rect x="238" y="284" width="178" height="34" rx="4" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>
  <text x="327" y="298" text-anchor="middle" font-size="9" font-weight="500" fill="#27272a">Coder Session</text>
  <text x="327" y="310" text-anchor="middle" font-size="8" fill="#71717a">ses_a1b2c3d4e5f6</text>

  <text x="54" y="340" font-size="8" fill="#71717a">cwd = project-a worktree · opencode run -s ses_a1b2c3</text>

  <!-- Ticket 2 -->
  <rect x="44" y="358" width="382" height="104" rx="6" fill="#fff" stroke="#d4d4d8" stroke-width="1" filter="url(#s)"/>
  <rect x="44" y="358" width="382" height="24" rx="6" fill="#fafafa"/>
  <rect x="44" y="376" width="382" height="6" fill="#fafafa"/>
  <text x="235" y="373" text-anchor="middle" font-size="10" font-weight="600" fill="#27272a">Ticket: fix-login-bug-d4e5f6</text>

  <rect x="54" y="392" width="170" height="34" rx="4" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>
  <text x="139" y="406" text-anchor="middle" font-size="9" font-weight="500" fill="#27272a">Worktree</text>
  <text x="139" y="418" text-anchor="middle" font-size="8" fill="#71717a">.worktrees/d4e5f6</text>

  <rect x="238" y="392" width="178" height="34" rx="4" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>
  <text x="327" y="406" text-anchor="middle" font-size="9" font-weight="500" fill="#27272a">Coder Session</text>
  <text x="327" y="418" text-anchor="middle" font-size="8" fill="#71717a">ses_d4e5f6g7h8i9</text>

  <text x="54" y="448" font-size="8" fill="#71717a">cwd = project-a worktree · unique session, unique branch</text>

  <rect x="44" y="468" width="382" height="22" rx="4" fill="#fafafa" stroke="#d4d4d8" stroke-width="1"/>
  <text x="54" y="482" font-size="8" fill="#71717a">Data: project-a/.jira-dashboard/store.db</text>

  <!-- Repo B -->
  <rect x="460" y="136" width="410" height="530" rx="8" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1" filter="url(#s)"/>
  <rect x="460" y="136" width="410" height="30" rx="8" fill="#e5e5e5"/>
  <rect x="460" y="158" width="410" height="8" fill="#e5e5e5"/>
  <text x="665" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#27272a">Git Repo B  —  /home/user/project-b</text>

  <rect x="474" y="178" width="382" height="26" rx="4" fill="#fff" stroke="#d4d4d8" stroke-width="1"/>
  <text x="484" y="192" font-size="9" font-weight="500" fill="#52525b">.env</text>
  <text x="510" y="192" font-size="8" fill="#71717a">OPENAI_API_KEY=sk-...  PATH=./node_modules/.bin</text>

  <rect x="474" y="210" width="382" height="26" rx="4" fill="#fff" stroke="#d4d4d8" stroke-width="1"/>
  <text x="484" y="224" font-size="9" font-weight="500" fill="#52525b">node_modules</text>
  <text x="510" y="224" font-size="8" fill="#71717a">TypeScript, React, vite — different toolchain, no assumptions</text>

  <!-- Ticket 3 -->
  <rect x="474" y="250" width="382" height="104" rx="6" fill="#fff" stroke="#d4d4d8" stroke-width="1" filter="url(#s)"/>
  <rect x="474" y="250" width="382" height="24" rx="6" fill="#fafafa"/>
  <rect x="474" y="268" width="382" height="6" fill="#fafafa"/>
  <text x="665" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#27272a">Ticket: add-api-endpoint-g7h8i9</text>

  <rect x="484" y="284" width="170" height="34" rx="4" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>
  <text x="569" y="298" text-anchor="middle" font-size="9" font-weight="500" fill="#27272a">Worktree</text>
  <text x="569" y="310" text-anchor="middle" font-size="8" fill="#71717a">.worktrees/g7h8i9</text>

  <rect x="668" y="284" width="178" height="34" rx="4" fill="#f5f5f5" stroke="#d4d4d8" stroke-width="1"/>
  <text x="757" y="298" text-anchor="middle" font-size="9" font-weight="500" fill="#27272a">Coder Session</text>
  <text x="757" y="310" text-anchor="middle" font-size="8" fill="#71717a">ses_g7h8i9j0k1l2</text>

  <text x="484" y="340" font-size="8" fill="#71717a">cwd = project-b worktree · inherits project-b node_modules</text>

  <rect x="474" y="468" width="382" height="22" rx="4" fill="#fafafa" stroke="#d4d4d8" stroke-width="1"/>
  <text x="484" y="482" font-size="8" fill="#71717a">Data: project-b/.jira-dashboard/store.db</text>

  <!-- Legend -->
  <rect x="474" y="510" width="382" height="68" rx="6" fill="#fafafa" stroke="#d4d4d8" stroke-width="1"/>
  <text x="494" y="528" font-size="10" font-weight="600" fill="#27272a">Legend</text>
  <rect x="494" y="538" width="8" height="8" rx="2" fill="#a1a1aa"/>
  <text x="510" y="546" font-size="8" fill="#52525b">Git repo — isolated cwd, inherits its own dependencies and env</text>
  <rect x="494" y="554" width="8" height="8" rx="2" fill="#d4d4d8" stroke="#a1a1aa" stroke-width="1"/>
  <text x="510" y="562" font-size="8" fill="#52525b">Worktree — isolated filesystem per ticket</text>
  <rect x="494" y="570" width="8" height="8" rx="2" fill="#a1a1aa" opacity="0.4"/>
  <text x="510" y="578" font-size="8" fill="#52525b">Coder session — private LLM context, no cross-ticket leakage</text>
</svg>